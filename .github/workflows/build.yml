name: Build

# Weekly production build: download the real ABR ABN Bulk Extract, run the full
# pipeline (download → load → flatten → verify → split → compress), and publish
# the per-state NDJSON(.gz) + metadata.json + manifest.json as a
# GitHub Release.
#
# Mirrors scripts/build-local.sh, but against a postgres:16 service and on a
# disk-freed runner (the extract is ~13 GB of XML). The fixture loop
# (build-fixture-only.sh) and the real-data smoke (docs/PERFORMANCE.md) cover the
# pipeline itself; this workflow is the release wrapper.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ABR extract date YYYY.MM.DD (blank → auto-discover the current extract)"
        required: false
      publish:
        description: "Publish the release (false → leave it as a draft)"
        type: boolean
        default: true
      allow_partial_enrichment:
        description: "DANGER: ship even if an enrichment source of truth is incomplete (default false)"
        type: boolean
        default: false
      compare_threshold:
        description: "Per-state/total move that flags a build for review (1.0 = 100%)"
        required: false
        default: "0.25"
  schedule:
    # Weekly — Mondays 03:00 UTC. The ABR ABN Bulk Extract refreshes weekly, so this
    # tracks the freshest core data; version-tagged releases + the S3 mirror are keyed
    # on the extract date. A week with no new extract re-resolves the SAME version — the
    # precheck step detects its tag is already published and skips the build as a green
    # no-op (no wasted ~2 h build, no red run, no duplicate artifact set).
    - cron: "0 3 * * 1"

permissions:
  contents: write # create the GitHub Release
  actions: write # dispatch docker-publish.yml for the resolved tag
  # NB: id-token (AWS OIDC) is granted ONLY to the separate mirror-s3 job below, not to
  # the build job that runs the pipeline — least privilege.

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  # crema is pinned to a reviewed git tag, not its moving default branch, so a
  # release is reproducible and never changes underneath long-black. Bump this
  # (and re-test) when adopting a new crema — see docs/RELEASING.md.
  CREMA_REF: v0.3.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Exposed to the separate mirror-s3 job (which downloads the published release and
    # pushes it to S3 under its own scoped id-token permission).
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      published: ${{ steps.publish.outputs.published }}
      anomalies: ${{ steps.compare.outputs.anomalies }}
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abn
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/abn
    steps:
      - name: Free disk space (the extract is ~13 GB of XML)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: actions/checkout@v4
        with:
          path: long-black
      - uses: actions/checkout@v4
        with:
          repository: jbejenar/crema
          ref: ${{ env.CREMA_REF }} # pinned — see env.CREMA_REF above
          path: crema
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build crema
        working-directory: crema
        run: npm ci && npm run build
      - name: Install + build long-black
        working-directory: long-black
        run: npm ci && npm run build

      - name: Resolve + validate version
        id: ver
        working-directory: long-black
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          V="$INPUT_VERSION"
          if [ -z "$V" ]; then
            V=$(curl -s "https://data.gov.au/data/api/3/action/package_show?id=abn-bulk-extract" \
              | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; ds=[x['last_modified'] for x in r['resources'] if (x.get('format') or '').upper()=='ZIP']; print(max(ds)[:10].replace('-','.'))")
          fi
          # Validate BEFORE this value is reused in any privileged shell step, file
          # name, schema name, or release tag. A strict YYYY.MM.DD is the single
          # trusted canonical form; reject anything else (shell metacharacters,
          # newlines, path separators, malformed CKAN data) up front. bash's
          # [[ =~ ]] anchors the WHOLE string, so an embedded newline cannot smuggle
          # a valid-looking first line past the check (grep -E matches per line).
          if [[ ! "$V" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "::error::resolved version '$V' is not a valid YYYY.MM.DD extract date"
            exit 1
          fi
          SV=$(printf '%s' "$V" | tr -d '.')
          echo "Resolved version: $V (schema suffix $SV)"
          {
            echo "version=$V"
            echo "tag=v$V"
            echo "sv=$SV"
          } >> "$GITHUB_OUTPUT"

      - name: Skip if this extract is already released (scheduled no-op week)
        id: precheck
        # Weekly cron, but the ABR extract only refreshes ~weekly and can be unchanged
        # (holidays, slipped upstream). CKAN then re-resolves the SAME version, whose tag
        # is already published — and the publish step (rightly) refuses to mutate a live
        # release. On a SCHEDULED run that is a benign no-op, not a failure: skip the
        # whole ~2 h build and finish green. (A manual dispatch of an already-published
        # version still hits the hard error — corrected data must get a new version tag.)
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$(gh release view "$TAG" --repo "$REPO" --json isDraft --jq '.isDraft' 2>/dev/null)" = "false" ]; then
            echo "::notice::$TAG is already published — no new ABR extract this week, skipping build (no-op)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (download → load → finalize → flatten → verify → output)
        if: steps.precheck.outputs.skip != 'true'
        working-directory: long-black
        env:
          # All dynamic values reach the shell via env (validated above), never as
          # ${{ }} interpolation inside the run body.
          LONG_BLACK_VERSION: ${{ steps.ver.outputs.version }}
          VERSION: ${{ steps.ver.outputs.version }}
          SV: ${{ steps.ver.outputs.sv }}
          # Empty on the scheduled run → strict (required enrichment); `true` only
          # via a deliberate manual dispatch.
          ALLOW_PARTIAL: ${{ github.event.inputs.allow_partial_enrichment }}
          # GrantConnect grant-awards login — enrich-cli reads these to download the
          # bulk report. Absent → the source is skipped and the coverage gate (below)
          # fails the build, so a release never silently drops grant awards.
          GRANTCONNECT_USERNAME: ${{ secrets.GRANTCONNECT_USERNAME }}
          GRANTCONNECT_PASSWORD: ${{ secrets.GRANTCONNECT_PASSWORD }}
        run: |
          set -euo pipefail
          # psql forwards "$@" for future call sites; current callers only pipe stdin.
          # shellcheck disable=SC2119,SC2120
          psql() { PGPASSWORD=postgres command psql -h localhost -p 5433 -U postgres -d abn -v ON_ERROR_STOP=1 -q "$@"; }
          mkdir -p data output

          echo "::group::download"
          XML=()
          while IFS= read -r f; do [ -n "$f" ] && XML+=("$f"); done < <(DATA_DIR=data node dist/download-cli.js)
          echo "${#XML[@]} XML files"
          echo "::endgroup::"

          echo "::group::schema + load"
          echo "DROP SCHEMA IF EXISTS abn_${SV} CASCADE;" | psql
          sed "s/__SCHEMA_VERSION__/${SV}/g" sql/staging-schema.sql | psql
          node dist/load-cli.js "${XML[@]}"
          sed "s/__SCHEMA_VERSION__/${SV}/g" sql/abn-finalize.sql | psql
          echo "::endgroup::"

          echo "::group::enrichment (ASIC + ACNC + AusTender + GrantConnect + ATO — REQUIRED)"
          # The data must be complete before shipping: every source of truth must
          # load (and clear its per-source row floor in enrich-cli) or the build
          # fails. A deliberate manual run can set allow_partial_enrichment=true to
          # ship with a degraded source; the scheduled weekly build never does.
          COVERAGE_PROFILE=production
          if DATA_DIR=data node dist/enrich-cli.js; then
            echo "enrichment complete — all sources loaded above floor"
          elif [ "${ALLOW_PARTIAL:-}" = "true" ]; then
            echo "::warning::enrichment incomplete, but allow_partial_enrichment=true — shipping degraded data"
            COVERAGE_PROFILE=off
          else
            echo "::error::enrichment incomplete — refusing to ship partial data (override: allow_partial_enrichment=true)"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::flatten + verify (+ enrichment coverage gate)"
          LONG_BLACK_COVERAGE_PROFILE="$COVERAGE_PROFILE" node dist/cli.js "output/long-black-${VERSION}.ndjson"
          echo "::endgroup::"

          echo "::group::output (split + gzip + metadata)"
          node dist/output-cli.js "output/long-black-${VERSION}.ndjson" output
          echo "::endgroup::"

          echo "::group::manifest (per-shard checksums + provenance)"
          node dist/manifest-cli.js output
          echo "::endgroup::"

      - name: Verify release assets
        if: steps.precheck.outputs.skip != 'true'
        working-directory: long-black
        run: |
          set -euo pipefail
          test -f output/metadata.json
          count=0
          for f in output/long-black-*.ndjson.gz; do
            gzip -t "$f"
            count=$((count + 1))
          done
          [ "$count" -ge 1 ] || { echo "no per-state output files"; exit 1; }
          echo "$count gzip files, all valid"
          # The release manifest (per-shard checksums + provenance) must exist and parse.
          [ -s output/manifest.json ] || { echo "no manifest.json"; exit 1; }
          jq -e '.manifest_version == 2 and (.files | length) >= 1' output/manifest.json > /dev/null
          ls -lh output/long-black-*.ndjson.gz output/metadata.json output/manifest.json

      - name: Compare to prior release (anomaly gate)
        id: compare
        if: steps.precheck.outputs.skip != 'true'
        working-directory: long-black
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          THRESHOLD: ${{ github.event.inputs.compare_threshold || '0.25' }}
        run: |
          set -euo pipefail
          # Guard against a corrupt build silently going public: diff this build's
          # per-state + total counts against the last PUBLISHED release. A move past
          # THRESHOLD (or a state appearing/retiring) holds the release as a draft
          # for human review rather than publishing automatically.
          if ! gh release view --repo "$REPO" --json tagName --jq '.tagName' > /tmp/prior_tag 2>/dev/null; then
            echo "no prior published release — skipping comparison (first release)"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PRIOR_TAG=$(cat /tmp/prior_tag)
          mkdir -p prior
          if ! gh release download "$PRIOR_TAG" --repo "$REPO" --pattern metadata.json --dir prior --clobber 2>/dev/null; then
            echo "::warning::prior release $PRIOR_TAG has no metadata.json — skipping comparison"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "comparing $VERSION against prior $PRIOR_TAG (threshold $THRESHOLD)"
          set +e
          node dist/compare-cli.js output/metadata.json prior/metadata.json --threshold "$THRESHOLD"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "comparison clean — no anomalies"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 2 ]; then
            echo "::warning::comparison flagged anomalies — release will be held as a DRAFT for review"
            echo "anomalies=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::comparison tool failed (exit $rc)"; exit "$rc"
          fi

      - name: Upload comparison reports
        if: always() && steps.precheck.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: comparison-reports
          path: long-black/comparison-*.*
          if-no-files-found: ignore

      - name: Publish GitHub Release
        id: publish
        if: steps.precheck.outputs.skip != 'true'
        working-directory: long-black
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
          # Empty on the scheduled run → publishes; `false` on a manual run → draft.
          PUBLISH: ${{ github.event.inputs.publish }}
          # `true` when the anomaly gate flagged a large move vs the prior release.
          ANOMALIES: ${{ steps.compare.outputs.anomalies }}
        run: |
          set -euo pipefail
          # Count + per-state table parsed from metadata.json via jq. The
          # catalogue (catalogue.yml) reads these back from the release body, so
          # the format — "**<n>** businesses" and "| <STATE> | <n> |" — is
          # load-bearing (matches src/catalogue.ts ABN_BRANDING.keyPattern).
          STATS=$(jq -r '
            "**\(.totalCount)** businesses.",
            "",
            "| State | Businesses |",
            "| --- | ---: |",
            (.counts | to_entries | sort_by(.key)[] | "| \(.key | ascii_upcase) | \(.value) |")
          ' output/metadata.json)
          {
            echo "Australian Business (ABN) data — one NDJSON document per ABN, split per state and gzip-compressed. The full all-ABN dataset (\`all.ndjson.gz\`) is on the S3 mirror."
            echo "Source: ABR ABN Bulk Extract, extract ${VERSION}."
            echo ""
            echo "${STATS}"
            echo ""
            echo "Schema: v$(node -p "require('./package.json').version")"
            echo ""
            echo "**Licence:** CC-BY 3.0 AU. Contains data © Commonwealth of Australia (Australian Business Register). See \`docs/DATA-SOURCES.md\`."
            echo ""
            echo "Each release also ships \`manifest.json\` (per-shard sha256 + record counts + build provenance)."
            echo ""
            echo "Download a state file, e.g.:"
            echo '```'
            echo "gh release download ${TAG} --repo ${REPO} --pattern 'long-black-*-nsw.ndjson.gz'"
            echo '```'
          } > RELEASE_NOTES.md

          WANT_DRAFT=false
          [ "${PUBLISH}" = "false" ] && WANT_DRAFT=true
          # The anomaly gate holds a suspicious build as a draft for review even on
          # an otherwise-publishing run — corrupt data must never auto-publish.
          if [ "${ANOMALIES:-}" = "true" ]; then
            echo "::warning::anomaly gate flagged this build — forcing draft for review"
            WANT_DRAFT=true
          fi
          ASSETS=(output/long-black-*.ndjson.gz output/metadata.json output/manifest.json)

          # Verify every expected asset is present on the release with a NONZERO
          # size before it is made public — by exact name, not just an aggregate
          # count (a clobber could leave a renamed/0-byte asset that a count misses).
          verify_assets() {
            local a base size missing=0
            gh release view "$TAG" --json assets --jq '.assets[] | "\(.name)\t\(.size)"' > rel-assets.tsv
            for a in "${ASSETS[@]}"; do
              base=$(basename "$a")
              size=$(awk -F'\t' -v n="$base" '$1 == n {print $2}' rel-assets.tsv)
              if [ -z "$size" ]; then
                echo "::error::asset $base missing on $TAG"; missing=1
              elif [ "$size" -le 0 ]; then
                echo "::error::asset $base is empty ($size bytes) on $TAG"; missing=1
              fi
            done
            [ "$missing" = 0 ] || exit 1
            echo "verified ${#ASSETS[@]} assets present with nonzero size on $TAG"
          }

          # Release identity + atomicity as ONE contract:
          #   1. The release tag MUST point at THIS build commit ("$GITHUB_SHA"), so
          #      the published source always matches the assets it produced (and the
          #      image built from the tag is built from that same source).
          #   2. A live PUBLISHED release is never mutated — corrected data gets a
          #      NEW version tag — so consumers never see a partial/changing release.
          #   3. New releases publish only from an invisible draft pinned to the
          #      build commit, promoted only after every asset is verified.

          # (1) A real (pushed) tag must already BE this build commit. Drafts carry
          # no pushed tag yet, so this only fires for an existing published/manual tag.
          TAG_SHA=""
          TYPE=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.type' 2>/dev/null) || TYPE=""
          if [ "$TYPE" = "commit" ]; then
            TAG_SHA=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.sha')
          elif [ "$TYPE" = "tag" ]; then # annotated tag → dereference to its commit
            OBJ=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.sha')
            TAG_SHA=$(gh api "repos/$REPO/git/tags/$OBJ" --jq '.object.sha')
          fi
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::tag $TAG already exists at $TAG_SHA, not this build commit $GITHUB_SHA — cut a NEW version for corrected data"
            exit 1
          fi

          REL_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null) || REL_DRAFT="none"
          if [ "$REL_DRAFT" = "false" ]; then
            # (2) Refuse to mutate a live published dataset release.
            echo "::error::release $TAG is already published — cut a NEW version tag for corrected data rather than mutating a live release"
            exit 1
          elif [ "$REL_DRAFT" = "true" ]; then
            # Reuse the existing (invisible) draft: retarget it to this build commit,
            # replace every asset, verify, then promote per PUBLISH.
            gh release edit "$TAG" --target "$GITHUB_SHA" --title "long-black $TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
            verify_assets
            [ "$WANT_DRAFT" = "false" ] && gh release edit "$TAG" --draft=false
          else
            # (3) Fresh: invisible draft pinned to the build commit, upload, verify,
            # then promote. A mid-upload failure leaves a draft, never a partial
            # public release.
            gh release create "$TAG" --draft --target "$GITHUB_SHA" \
              --title "long-black $TAG" --notes-file RELEASE_NOTES.md "${ASSETS[@]}"
            verify_assets
            [ "$WANT_DRAFT" = "false" ] && gh release edit "$TAG" --draft=false
          fi

          # The tag is now guaranteed == "$GITHUB_SHA", so always dispatch
          # docker-publish with that expected SHA when the release is published;
          # docker-publish re-asserts the tag resolves to it before pushing.
          FINAL_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft')
          if [ "$FINAL_DRAFT" = "false" ]; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "dispatching docker-publish for $TAG @ $GITHUB_SHA"
            gh workflow run docker-publish.yml -f tag="$TAG" -f expected_sha="$GITHUB_SHA" \
              || echo "::warning::could not dispatch docker-publish.yml; run it manually with -f tag=$TAG -f expected_sha=$GITHUB_SHA"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "release left as a draft → skipping docker-publish"
          fi

  # --- Optional S3 mirror (separate least-privilege job) -------------------------------
  # Mirrors each published release to the SHARED S3 bucket, following flat-white's
  # product-namespaced convention so the two products coexist (flat-white writes
  # data/address/… + manifests/address-<ver>.json; long-black writes data/abn/… +
  # manifests/abn-<ver>.json). Dormant until configured: runs only when the repo VARIABLE
  # `AWS_ROLE_ARN` is set AND the build published a non-anomalous release. A SEPARATE job
  # so `id-token: write` (AWS OIDC assume-role) is scoped here, never to the pipeline job.
  # It re-downloads the immutable published release, so a partial-mirror failure is fixed
  # by re-running THIS job (no rebuild); data prefixes are immutable (no in-place mutation,
  # so no delete permission). Auth is GitHub OIDC — set repo variable `AWS_ROLE_ARN` to a
  # NEW role (e.g. arn:aws:iam::493712557159:role/long-black-role) that trusts THIS repo's
  # Actions OIDC (flat-white-role trusts only jbejenar/flat-white) with s3:PutObject +
  # s3:ListBucket on `data/abn/*` and `manifests/abn-*`. The bucket + region default to
  # flat-white's; override with vars S3_BUCKET / AWS_REGION. See docs/RELEASING.md.
  mirror-s3:
    needs: build
    if: >-
      vars.AWS_ROLE_ARN != '' && needs.build.outputs.published == 'true' &&
      needs.build.outputs.anomalies != 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS OIDC role (this job only)
      contents: read # gh release download
    env:
      S3_BUCKET: ${{ vars.S3_BUCKET || 'flat-white-address-493712557159-ap-southeast-2-an' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
    steps:
      - name: Download the published release assets (clean staging)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir s3-staging
          # The per-state shards (the data), metadata.json (per-source CC-BY attribution —
          # a licence requirement that must travel with EVERY distribution channel), and
          # the release manifest (which the S3 manifest is derived from).
          gh release download "$TAG" --repo "$REPO" --dir s3-staging \
            --pattern 'long-black-*.ndjson.gz' --pattern 'metadata.json' --pattern 'manifest.json'
          ls -lh s3-staging

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mirror to the shared bucket (data/abn/<ver>/ + manifests/abn-<ver>.json)
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -euo pipefail
          VER="${TAG#v}"                       # strip the leading v (v2026.06.24 → 2026.06.24)
          DEST="s3://${S3_BUCKET}/data/abn/${VER}"
          P="data/abn/${VER}/"

          # Build the full all-ABN bundle from the per-state shards, PRESERVING the global
          # ABN order the output contract documents (ORDER BY abn) — a plain cat would
          # group by state. Each shard is already ABN-sorted (a subset of that output) and
          # every line starts with the fixed prefix {"_id":"<11-digit abn>", so a byte-wise
          # (LC_ALL=C) `sort -m` MERGE of the shards reproduces the global order. The shards
          # stream through FIFOs (no multi-GB temp files), and the merged stream is counted
          # (tee → wc) in the same pass so we can verify no records were lost/duplicated.
          fifos=(); i=0
          for f in s3-staging/long-black-*.ndjson.gz; do
            mkfifo "s3-staging/.pipe$i"; gzip -dc "$f" > "s3-staging/.pipe$i" &
            fifos+=("s3-staging/.pipe$i"); i=$((i + 1))
          done
          LC_ALL=C sort -m "${fifos[@]}" | gzip > s3-staging/all.ndjson.gz
          wait
          rm -f s3-staging/.pipe*
          # Integrity: the merged bundle must have EXACTLY total_records lines — a dropped
          # or duplicated record (a broken merge / truncated shard) fails the mirror here.
          ALL_LINES=$(gzip -dc s3-staging/all.ndjson.gz | wc -l | tr -d ' ')
          TOTAL=$(jq '.total_records' s3-staging/manifest.json)
          [ "$ALL_LINES" = "$TOTAL" ] || { echo "::error::all.ndjson.gz has $ALL_LINES records, expected $TOTAL (merge lost/duplicated data)"; exit 1; }
          echo "all.ndjson.gz: $(du -h s3-staging/all.ndjson.gz | cut -f1), $ALL_LINES records (ABN-ordered), from $i shards"

          # Licence guard: the CC-BY attribution must travel with every distribution
          # channel, so metadata.json (its per-source sources[] with licence + attribution)
          # must be present and complete BEFORE anything is published to S3.
          jq -e '(.sources | length) > 0 and all(.sources[]; (.attribution // "") != "" and (.licence // "") != "")' \
            s3-staging/metadata.json > /dev/null \
            || { echo "::error::metadata.json missing per-source licence/attribution — refusing to publish to S3"; exit 1; }

          # Immutable, product-namespaced DATA (matches flat-white's data/<product>/<ver>/):
          # the per-state shards + the full all.ndjson.gz + metadata.json (the attribution
          # that must accompany the data). The manifest goes to a SEPARATE manifests/
          # prefix, uploaded LAST (after the data it describes is present).
          aws s3 cp s3-staging/ "${DEST}/" --recursive --no-progress \
            --exclude '*' --include 'long-black-*.ndjson.gz' --include 'all.ndjson.gz' \
            --include 'metadata.json'

          # A+++ S3 manifest: (1) rewrite each shard's key to its S3 key; (2) add
          # all.ndjson.gz as an AGGREGATE file with its own sha256 + bytes, marked
          # aggregate:true and EXCLUDED from total_records (it duplicates the shards, so
          # counting it would double the total). The bundle is fully integrity-described
          # without inflating the count.
          ALL_SHA=$(sha256sum s3-staging/all.ndjson.gz | cut -d' ' -f1)
          ALL_BYTES=$(stat -c%s s3-staging/all.ndjson.gz)
          jq --arg p "$P" --arg sha "$ALL_SHA" --argjson bytes "$ALL_BYTES" '
            (.files |= map(.key = ($p + (.key | sub(".*/"; "")))))
            | .files += [{
                key: ($p + "all.ndjson.gz"),
                records: .total_records,
                bytes: $bytes,
                sha256: $sha,
                aggregate: true
              }]
          ' s3-staging/manifest.json > manifest.s3.json

          # Integrity gate: total_records must still equal the sum of the NON-aggregate
          # (per-state) files — a broken rewrite or a double-count fails the mirror here.
          SUM=$(jq '[.files[] | select(.aggregate != true) | .records] | add' manifest.s3.json)
          TOTAL=$(jq '.total_records' manifest.s3.json)
          [ "$SUM" = "$TOTAL" ] || { echo "::error::S3 manifest total mismatch: $SUM != $TOTAL"; exit 1; }

          aws s3 cp manifest.s3.json "s3://${S3_BUCKET}/manifests/abn-${VER}.json" \
            --content-type application/json --no-progress
          echo "mirrored ${TAG} → ${DEST}/ (shards + all.ndjson.gz) ; manifest → manifests/abn-${VER}.json"
