name: Build

# Monthly production build: download the real ABR ABN Bulk Extract, run the full
# pipeline (download → load → flatten → verify → split → compress), and publish
# the per-state NDJSON(.gz) + all-ABN Parquet + metadata.json + manifest.json as a
# GitHub Release.
#
# Mirrors scripts/build-local.sh, but against a postgres:16 service and on a
# disk-freed runner (the extract is ~13 GB of XML). The fixture loop
# (build-fixture-only.sh) and the real-data smoke (docs/PERFORMANCE.md) cover the
# pipeline itself; this workflow is the release wrapper.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "ABR extract date YYYY.MM.DD (blank → auto-discover the current extract)"
        required: false
      publish:
        description: "Publish the release (false → leave it as a draft)"
        type: boolean
        default: true
      allow_partial_enrichment:
        description: "DANGER: ship even if an enrichment source of truth is incomplete (default false)"
        type: boolean
        default: false
      compare_threshold:
        description: "Per-state/total move that flags a build for review (1.0 = 100%)"
        required: false
        default: "0.25"
  schedule:
    # 5th of each month, 03:00 UTC — the ABR refreshes weekly, so any week's
    # extract is fresh; a monthly cadence avoids 52 artifact sets/year.
    - cron: "0 3 5 * *"

permissions:
  contents: write # create the GitHub Release
  actions: write # dispatch docker-publish.yml for the resolved tag

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

env:
  # crema is pinned to a reviewed git tag, not its moving default branch, so a
  # release is reproducible and never changes underneath long-black. Bump this
  # (and re-test) when adopting a new crema — see docs/RELEASING.md.
  CREMA_REF: v0.3.0

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: abn
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 3s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5433/abn
    steps:
      - name: Free disk space (the extract is ~13 GB of XML)
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - uses: actions/checkout@v4
        with:
          path: long-black
      - uses: actions/checkout@v4
        with:
          repository: jbejenar/crema
          ref: ${{ env.CREMA_REF }} # pinned — see env.CREMA_REF above
          path: crema
      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build crema
        working-directory: crema
        run: npm ci && npm run build
      - name: Install + build long-black
        working-directory: long-black
        run: npm ci && npm run build

      - name: Resolve + validate version
        id: ver
        working-directory: long-black
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          V="$INPUT_VERSION"
          if [ -z "$V" ]; then
            V=$(curl -s "https://data.gov.au/data/api/3/action/package_show?id=abn-bulk-extract" \
              | python3 -c "import sys,json; r=json.load(sys.stdin)['result']; ds=[x['last_modified'] for x in r['resources'] if (x.get('format') or '').upper()=='ZIP']; print(max(ds)[:10].replace('-','.'))")
          fi
          # Validate BEFORE this value is reused in any privileged shell step, file
          # name, schema name, or release tag. A strict YYYY.MM.DD is the single
          # trusted canonical form; reject anything else (shell metacharacters,
          # newlines, path separators, malformed CKAN data) up front. bash's
          # [[ =~ ]] anchors the WHOLE string, so an embedded newline cannot smuggle
          # a valid-looking first line past the check (grep -E matches per line).
          if [[ ! "$V" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "::error::resolved version '$V' is not a valid YYYY.MM.DD extract date"
            exit 1
          fi
          SV=$(printf '%s' "$V" | tr -d '.')
          echo "Resolved version: $V (schema suffix $SV)"
          {
            echo "version=$V"
            echo "tag=v$V"
            echo "sv=$SV"
          } >> "$GITHUB_OUTPUT"

      - name: Build (download → load → finalize → flatten → verify → output)
        working-directory: long-black
        env:
          # All dynamic values reach the shell via env (validated above), never as
          # ${{ }} interpolation inside the run body.
          LONG_BLACK_VERSION: ${{ steps.ver.outputs.version }}
          VERSION: ${{ steps.ver.outputs.version }}
          SV: ${{ steps.ver.outputs.sv }}
          # Empty on the scheduled run → strict (required enrichment); `true` only
          # via a deliberate manual dispatch.
          ALLOW_PARTIAL: ${{ github.event.inputs.allow_partial_enrichment }}
        run: |
          set -euo pipefail
          # psql forwards "$@" for future call sites; current callers only pipe stdin.
          # shellcheck disable=SC2119,SC2120
          psql() { PGPASSWORD=postgres command psql -h localhost -p 5433 -U postgres -d abn -v ON_ERROR_STOP=1 -q "$@"; }
          mkdir -p data output

          echo "::group::download"
          XML=()
          while IFS= read -r f; do [ -n "$f" ] && XML+=("$f"); done < <(DATA_DIR=data node dist/download-cli.js)
          echo "${#XML[@]} XML files"
          echo "::endgroup::"

          echo "::group::schema + load"
          echo "DROP SCHEMA IF EXISTS abn_${SV} CASCADE;" | psql
          sed "s/__SCHEMA_VERSION__/${SV}/g" sql/staging-schema.sql | psql
          node dist/load-cli.js "${XML[@]}"
          sed "s/__SCHEMA_VERSION__/${SV}/g" sql/abn-finalize.sql | psql
          echo "::endgroup::"

          echo "::group::enrichment (ASIC + ACNC — REQUIRED)"
          # The data must be complete before shipping: every source of truth must
          # load (and clear its per-source row floor in enrich-cli) or the build
          # fails. A deliberate manual run can set allow_partial_enrichment=true to
          # ship with a degraded source; the scheduled monthly build never does.
          COVERAGE_PROFILE=production
          if DATA_DIR=data node dist/enrich-cli.js; then
            echo "enrichment complete — all sources loaded above floor"
          elif [ "${ALLOW_PARTIAL:-}" = "true" ]; then
            echo "::warning::enrichment incomplete, but allow_partial_enrichment=true — shipping degraded data"
            COVERAGE_PROFILE=off
          else
            echo "::error::enrichment incomplete — refusing to ship partial data (override: allow_partial_enrichment=true)"
            exit 1
          fi
          echo "::endgroup::"

          echo "::group::flatten + verify (+ enrichment coverage gate)"
          LONG_BLACK_COVERAGE_PROFILE="$COVERAGE_PROFILE" node dist/cli.js "output/long-black-${VERSION}.ndjson"
          echo "::endgroup::"

          echo "::group::output (split + gzip + metadata)"
          node dist/output-cli.js "output/long-black-${VERSION}.ndjson" output --parquet
          echo "::endgroup::"

          echo "::group::manifest (per-shard checksums + provenance)"
          node dist/manifest-cli.js output
          echo "::endgroup::"

      - name: Verify release assets
        working-directory: long-black
        run: |
          set -euo pipefail
          test -f output/metadata.json
          count=0
          for f in output/long-black-*.ndjson.gz; do
            gzip -t "$f"
            count=$((count + 1))
          done
          [ "$count" -ge 1 ] || { echo "no per-state output files"; exit 1; }
          echo "$count gzip files, all valid"
          # The all-ABN Parquet (emitted with --parquet) must exist and be nonempty.
          pq=$(ls output/long-black-*.parquet 2>/dev/null | head -1)
          [ -s "$pq" ] || { echo "no Parquet output file"; exit 1; }
          # The release manifest (per-shard checksums + provenance) must exist and parse.
          [ -s output/manifest.json ] || { echo "no manifest.json"; exit 1; }
          jq -e '.manifest_version == 2 and (.files | length) >= 1' output/manifest.json > /dev/null
          ls -lh output/long-black-*.ndjson.gz "$pq" output/metadata.json output/manifest.json

      - name: Compare to prior release (anomaly gate)
        id: compare
        working-directory: long-black
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.ver.outputs.version }}
          THRESHOLD: ${{ github.event.inputs.compare_threshold || '0.25' }}
        run: |
          set -euo pipefail
          # Guard against a corrupt build silently going public: diff this build's
          # per-state + total counts against the last PUBLISHED release. A move past
          # THRESHOLD (or a state appearing/retiring) holds the release as a draft
          # for human review rather than publishing automatically.
          if ! gh release view --repo "$REPO" --json tagName --jq '.tagName' > /tmp/prior_tag 2>/dev/null; then
            echo "no prior published release — skipping comparison (first release)"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PRIOR_TAG=$(cat /tmp/prior_tag)
          mkdir -p prior
          if ! gh release download "$PRIOR_TAG" --repo "$REPO" --pattern metadata.json --dir prior --clobber 2>/dev/null; then
            echo "::warning::prior release $PRIOR_TAG has no metadata.json — skipping comparison"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "comparing $VERSION against prior $PRIOR_TAG (threshold $THRESHOLD)"
          set +e
          node dist/compare-cli.js output/metadata.json prior/metadata.json --threshold "$THRESHOLD"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "comparison clean — no anomalies"
            echo "anomalies=false" >> "$GITHUB_OUTPUT"
          elif [ "$rc" -eq 2 ]; then
            echo "::warning::comparison flagged anomalies — release will be held as a DRAFT for review"
            echo "anomalies=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::comparison tool failed (exit $rc)"; exit "$rc"
          fi

      - name: Upload comparison reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparison-reports
          path: long-black/comparison-*.*
          if-no-files-found: ignore

      - name: Publish GitHub Release
        working-directory: long-black
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          REPO: ${{ github.repository }}
          # Empty on the scheduled run → publishes; `false` on a manual run → draft.
          PUBLISH: ${{ github.event.inputs.publish }}
          # `true` when the anomaly gate flagged a large move vs the prior release.
          ANOMALIES: ${{ steps.compare.outputs.anomalies }}
        run: |
          set -euo pipefail
          # Count + per-state table parsed from metadata.json via jq. The
          # catalogue (catalogue.yml) reads these back from the release body, so
          # the format — "**<n>** businesses" and "| <STATE> | <n> |" — is
          # load-bearing (matches src/catalogue.ts ABN_BRANDING.keyPattern).
          STATS=$(jq -r '
            "**\(.totalCount)** businesses.",
            "",
            "| State | Businesses |",
            "| --- | ---: |",
            (.counts | to_entries | sort_by(.key)[] | "| \(.key | ascii_upcase) | \(.value) |")
          ' output/metadata.json)
          {
            echo "Australian Business (ABN) data — one NDJSON document per ABN, split per state and gzip-compressed, plus an all-ABN Parquet file (\`long-black-${VERSION}.parquet\`)."
            echo "Source: ABR ABN Bulk Extract, extract ${VERSION}."
            echo ""
            echo "${STATS}"
            echo ""
            echo "Schema: v$(node -p "require('./package.json').version")"
            echo ""
            echo "**Licence:** CC-BY 3.0 AU. Contains data © Commonwealth of Australia (Australian Business Register). See \`docs/DATA-SOURCES.md\`."
            echo ""
            echo "Each release also ships \`manifest.json\` (per-shard sha256 + record counts + build provenance)."
            echo ""
            echo "Download a state file, e.g.:"
            echo '```'
            echo "gh release download ${TAG} --repo ${REPO} --pattern 'long-black-*-nsw.ndjson.gz'"
            echo '```'
          } > RELEASE_NOTES.md

          WANT_DRAFT=false
          [ "${PUBLISH}" = "false" ] && WANT_DRAFT=true
          # The anomaly gate holds a suspicious build as a draft for review even on
          # an otherwise-publishing run — corrupt data must never auto-publish.
          if [ "${ANOMALIES:-}" = "true" ]; then
            echo "::warning::anomaly gate flagged this build — forcing draft for review"
            WANT_DRAFT=true
          fi
          ASSETS=(output/long-black-*.ndjson.gz output/long-black-*.parquet output/metadata.json output/manifest.json)

          # Verify every expected asset is present on the release with a NONZERO
          # size before it is made public — by exact name, not just an aggregate
          # count (a clobber could leave a renamed/0-byte asset that a count misses).
          verify_assets() {
            local a base size missing=0
            gh release view "$TAG" --json assets --jq '.assets[] | "\(.name)\t\(.size)"' > rel-assets.tsv
            for a in "${ASSETS[@]}"; do
              base=$(basename "$a")
              size=$(awk -F'\t' -v n="$base" '$1 == n {print $2}' rel-assets.tsv)
              if [ -z "$size" ]; then
                echo "::error::asset $base missing on $TAG"; missing=1
              elif [ "$size" -le 0 ]; then
                echo "::error::asset $base is empty ($size bytes) on $TAG"; missing=1
              fi
            done
            [ "$missing" = 0 ] || exit 1
            echo "verified ${#ASSETS[@]} assets present with nonzero size on $TAG"
          }

          # Release identity + atomicity as ONE contract:
          #   1. The release tag MUST point at THIS build commit ("$GITHUB_SHA"), so
          #      the published source always matches the assets it produced (and the
          #      image built from the tag is built from that same source).
          #   2. A live PUBLISHED release is never mutated — corrected data gets a
          #      NEW version tag — so consumers never see a partial/changing release.
          #   3. New releases publish only from an invisible draft pinned to the
          #      build commit, promoted only after every asset is verified.

          # (1) A real (pushed) tag must already BE this build commit. Drafts carry
          # no pushed tag yet, so this only fires for an existing published/manual tag.
          TAG_SHA=""
          TYPE=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.type' 2>/dev/null) || TYPE=""
          if [ "$TYPE" = "commit" ]; then
            TAG_SHA=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.sha')
          elif [ "$TYPE" = "tag" ]; then # annotated tag → dereference to its commit
            OBJ=$(gh api "repos/$REPO/git/ref/tags/$TAG" --jq '.object.sha')
            TAG_SHA=$(gh api "repos/$REPO/git/tags/$OBJ" --jq '.object.sha')
          fi
          if [ -n "$TAG_SHA" ] && [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::tag $TAG already exists at $TAG_SHA, not this build commit $GITHUB_SHA — cut a NEW version for corrected data"
            exit 1
          fi

          REL_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null) || REL_DRAFT="none"
          if [ "$REL_DRAFT" = "false" ]; then
            # (2) Refuse to mutate a live published dataset release.
            echo "::error::release $TAG is already published — cut a NEW version tag for corrected data rather than mutating a live release"
            exit 1
          elif [ "$REL_DRAFT" = "true" ]; then
            # Reuse the existing (invisible) draft: retarget it to this build commit,
            # replace every asset, verify, then promote per PUBLISH.
            gh release edit "$TAG" --target "$GITHUB_SHA" --title "long-black $TAG" --notes-file RELEASE_NOTES.md
            gh release upload "$TAG" --clobber "${ASSETS[@]}"
            verify_assets
            [ "$WANT_DRAFT" = "false" ] && gh release edit "$TAG" --draft=false
          else
            # (3) Fresh: invisible draft pinned to the build commit, upload, verify,
            # then promote. A mid-upload failure leaves a draft, never a partial
            # public release.
            gh release create "$TAG" --draft --target "$GITHUB_SHA" \
              --title "long-black $TAG" --notes-file RELEASE_NOTES.md "${ASSETS[@]}"
            verify_assets
            [ "$WANT_DRAFT" = "false" ] && gh release edit "$TAG" --draft=false
          fi

          # The tag is now guaranteed == "$GITHUB_SHA", so always dispatch
          # docker-publish with that expected SHA when the release is published;
          # docker-publish re-asserts the tag resolves to it before pushing.
          FINAL_DRAFT=$(gh release view "$TAG" --json isDraft --jq '.isDraft')
          if [ "$FINAL_DRAFT" = "false" ]; then
            echo "dispatching docker-publish for $TAG @ $GITHUB_SHA"
            gh workflow run docker-publish.yml -f tag="$TAG" -f expected_sha="$GITHUB_SHA" \
              || echo "::warning::could not dispatch docker-publish.yml; run it manually with -f tag=$TAG -f expected_sha=$GITHUB_SHA"
          else
            echo "release left as a draft → skipping docker-publish"
          fi
