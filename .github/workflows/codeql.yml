name: CodeQL

# Static analysis for the main ruleset's required `code_scanning` (CodeQL,
# errors / high-or-higher security) + `code_quality` (errors) checks. The
# `security-and-quality` query suite emits BOTH security and quality alerts, so
# one run satisfies both rules. JS/TS is interpreted, so no build step is needed.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 2 * * 1" # weekly, Monday 02:30 UTC — catches advisories on idle code

# Cancel an in-flight analysis when a branch gets a newer push.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
