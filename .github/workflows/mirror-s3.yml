name: Mirror release to S3 (reusable)

# Reusable mirror job — mirrors a published release to the SHARED S3 bucket following
# flat-white's product-namespaced convention so the two products coexist (flat-white
# writes data/address/… + manifests/address-<ver>.json; long-black writes data/abn/… +
# manifests/abn-<ver>.json). Dormant until configured: runs only when the repo VARIABLE
# `AWS_ROLE_ARN` is set. `id-token: write` (AWS OIDC assume-role) is scoped to THIS job.
# It re-downloads the immutable published release, so it is fully re-runnable and needs
# no rebuild; data prefixes are immutable (no in-place mutation, so no delete permission).
# Auth is GitHub OIDC — set repo variable `AWS_ROLE_ARN` to a role (e.g.
# arn:aws:iam::493712557159:role/long-black-role) that trusts THIS repo's Actions OIDC
# with s3:PutObject + s3:ListBucket on `data/abn/*` and `manifests/abn-*`. Bucket + region
# default to flat-white's; override with vars S3_BUCKET / AWS_REGION. See docs/RELEASING.md.
#
# Called by build.yml (after a publish) and by mirror-release.yml (on-demand, no rebuild).

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag to mirror (vYYYY.MM.DD)"
        required: true
        type: string

jobs:
  mirror-s3:
    if: vars.AWS_ROLE_ARN != ''
    runs-on: ubuntu-latest
    permissions:
      id-token: write # assume the AWS OIDC role (this job only)
      contents: read # gh release download
    env:
      S3_BUCKET: ${{ vars.S3_BUCKET || 'flat-white-address-493712557159-ap-southeast-2-an' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-2' }}
      TAG: ${{ inputs.tag }}
    steps:
      - name: Validate tag
        run: |
          set -euo pipefail
          # TAG is reused in shell, S3 keys, and gh commands — reject anything but the
          # canonical vYYYY.MM.DD before it flows anywhere (the build passes a
          # pre-validated tag; a manual mirror-release dispatch may not).
          [[ "$TAG" =~ ^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}$ ]] \
            || { echo "::error::invalid tag '$TAG' (expected vYYYY.MM.DD)"; exit 1; }

      - name: Download the release assets (clean staging)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir s3-staging
          # The per-state shards (the data), metadata.json (per-source CC-BY attribution —
          # a licence requirement that must travel with EVERY distribution channel), and
          # the release manifest (which the S3 manifest is derived from).
          gh release download "$TAG" --repo "$REPO" --dir s3-staging \
            --pattern 'long-black-*.ndjson.gz' --pattern 'metadata.json' --pattern 'manifest.json'
          ls -lh s3-staging

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Mirror to the shared bucket (data/abn/<ver>/ + manifests/abn-<ver>.json)
        run: |
          set -euo pipefail
          VER="${TAG#v}"                       # strip the leading v (v2026.06.24 → 2026.06.24)
          DEST="s3://${S3_BUCKET}/data/abn/${VER}"
          P="data/abn/${VER}/"

          # Build the full all-ABN bundle from the per-state shards, PRESERVING the global
          # ABN order the output contract documents (ORDER BY abn) — a plain cat would
          # group by state. Each shard is already ABN-sorted (a subset of that output) and
          # every line starts with the fixed prefix {"_id":"<11-digit abn>", so a byte-wise
          # (LC_ALL=C) `sort -m` MERGE of the shards reproduces the global order. The shards
          # stream through FIFOs (no multi-GB temp files).
          fifos=(); i=0
          for f in s3-staging/long-black-*.ndjson.gz; do
            mkfifo "s3-staging/.pipe$i"; gzip -dc "$f" > "s3-staging/.pipe$i" &
            fifos+=("s3-staging/.pipe$i"); i=$((i + 1))
          done
          LC_ALL=C sort -m "${fifos[@]}" | gzip > s3-staging/all.ndjson.gz
          wait
          rm -f s3-staging/.pipe*
          # Integrity: the merged bundle must have EXACTLY total_records lines — a dropped
          # or duplicated record (a broken merge / truncated shard) fails the mirror here.
          ALL_LINES=$(gzip -dc s3-staging/all.ndjson.gz | wc -l | tr -d ' ')
          TOTAL=$(jq '.total_records' s3-staging/manifest.json)
          [ "$ALL_LINES" = "$TOTAL" ] || { echo "::error::all.ndjson.gz has $ALL_LINES records, expected $TOTAL (merge lost/duplicated data)"; exit 1; }
          echo "all.ndjson.gz: $(du -h s3-staging/all.ndjson.gz | cut -f1), $ALL_LINES records (ABN-ordered), from $i shards"

          # Licence guard: the CC-BY attribution must travel with every distribution
          # channel, so metadata.json (its per-source sources[] with licence + attribution)
          # must be present and complete BEFORE anything is published to S3.
          jq -e '(.sources | length) > 0 and all(.sources[]; (.attribution // "") != "" and (.licence // "") != "")' \
            s3-staging/metadata.json > /dev/null \
            || { echo "::error::metadata.json missing per-source licence/attribution — refusing to publish to S3"; exit 1; }

          # Immutable, product-namespaced DATA (matches flat-white's data/<product>/<ver>/):
          # the per-state shards + the full all.ndjson.gz + metadata.json (the attribution
          # that must accompany the data). The manifest goes to a SEPARATE manifests/
          # prefix, uploaded LAST (after the data it describes is present).
          aws s3 cp s3-staging/ "${DEST}/" --recursive --no-progress \
            --exclude '*' --include 'long-black-*.ndjson.gz' --include 'all.ndjson.gz' \
            --include 'metadata.json'

          # A+++ S3 manifest: (1) rewrite each shard's key to its S3 key; (2) add
          # all.ndjson.gz as an AGGREGATE file with its own sha256 + bytes, marked
          # aggregate:true and EXCLUDED from total_records (it duplicates the shards, so
          # counting it would double the total). The bundle is fully integrity-described
          # without inflating the count.
          ALL_SHA=$(sha256sum s3-staging/all.ndjson.gz | cut -d' ' -f1)
          ALL_BYTES=$(stat -c%s s3-staging/all.ndjson.gz)
          jq --arg p "$P" --arg sha "$ALL_SHA" --argjson bytes "$ALL_BYTES" '
            (.files |= map(.key = ($p + (.key | sub(".*/"; "")))))
            | .files += [{
                key: ($p + "all.ndjson.gz"),
                records: .total_records,
                bytes: $bytes,
                sha256: $sha,
                aggregate: true
              }]
          ' s3-staging/manifest.json > manifest.s3.json

          # Integrity gate: total_records must still equal the sum of the NON-aggregate
          # (per-state) files — a broken rewrite or a double-count fails the mirror here.
          SUM=$(jq '[.files[] | select(.aggregate != true) | .records] | add' manifest.s3.json)
          TOTAL=$(jq '.total_records' manifest.s3.json)
          [ "$SUM" = "$TOTAL" ] || { echo "::error::S3 manifest total mismatch: $SUM != $TOTAL"; exit 1; }

          aws s3 cp manifest.s3.json "s3://${S3_BUCKET}/manifests/abn-${VER}.json" \
            --content-type application/json --no-progress
          echo "mirrored ${TAG} → ${DEST}/ (shards + all.ndjson.gz) ; manifest → manifests/abn-${VER}.json"
